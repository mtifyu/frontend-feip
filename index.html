<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Title</title>
        <link rel="stylesheet" href="./styles.css">
    </head>
    <body>
        <header>
            <p>Текст для хедера</p>
        </header>
        <main>
            <div class="container">
                <div class="left">
                    <h1>Список</h1>
                    <ul>
                        <li>Первый элемент</li>
                        <li>Второй элемент</li>
                        <li>Третий элемент</li>
                    </ul>
                </div>
                <div class="middle">
                    <h1>Заголовок</h1>
                    <p id="text">Этот текст будет меняться</p>
                    <button onclick="changeText()">Кнопка, меняющая текст сверху</button>
                </div>
                <div class="right">
                    <p>Текст для правого блока</p>
                </div>
            </div>
        </main>
        <footer>
            <p>Текст для футера</p>
        </footer>
        <script src="/script.js"></script>
    </body>
</html>
