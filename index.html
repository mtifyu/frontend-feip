<!DOCTYPE html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Title</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="./styles.css">
    </head>
    <body>
        <header>
            <p>Текст для хедера</p>
        </header>
        <main>
            <div class="container">
                <div class="left">
                    <h1>Список</h1>
                    <ul>
                        <li>Первый элемент</li>
                        <li>Второй элемент</li>
                        <li>Третий элемент</li>
                    </ul>
                </div>
                <div class="middle">
                    <img src="./cat.jpg" alt="cat">
                    <h1 class="title">Заголовок</h1>
                    <p id="text">Этот текст будет меняться</p>
                    <button onclick="changeText()">Кнопка, меняющая текст сверху</button>
                </div>
                <div class="right">
                    <p>Текст для правого блока</p>
                </div>
            </div>
        </main>
        <footer>
            <p>Текст для футера</p>
        </footer>
        <script src="/script.js"></script>
    </body>
</html>
